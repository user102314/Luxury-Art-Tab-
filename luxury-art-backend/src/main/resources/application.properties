spring.application.name=luxury-art-backend
server.port=8081

# Active application-local.properties (credentials — non versionné)
spring.profiles.active=local

# =============================================================================
# Supabase PostgreSQL — valeurs par défaut (surchargées en local)
# =============================================================================
spring.datasource.url=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres.aucdppanjchtodiorrlf
spring.datasource.password=${SUPABASE_DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.h2.console.enabled=false

# Images produits stockées localement dans ./uploads/ (servies via /uploads/**)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
