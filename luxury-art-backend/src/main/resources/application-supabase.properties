# =============================================================================
# Profil Supabase — création AUTOMATIQUE des tables (Hibernate ddl-auto=update)

spring.datasource.driver-class-name=org.postgresql.Driver

# Crée / met à jour les tables automatiquement depuis les entités JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Noms de colonnes snake_case (users, created_at, mot_de_passe…)
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

supabase.url=https://xslzrmvuehryagrdbklx.supabase.co
supabase.storage.bucket=product-images
